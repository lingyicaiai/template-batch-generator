<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Batch Generator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 980px; }
    textarea, input { width: 100%; margin-top: 8px; margin-bottom: 12px; }
    textarea { min-height: 140px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    button { padding: 10px 14px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 12px; overflow: auto; }
    .muted { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Template Batch Generator</h1>
  <p class="muted">Paste CSV + template, generate one output per row. Use placeholders like <code>{{name}}</code>, <code>{{company}}</code>.</p>

  <div class="row">
    <div>
      <label>CSV Data (first row as headers)</label>
      <textarea id="csv" placeholder="name,company\nAlice,Acme\nBob,Contoso"></textarea>
    </div>
    <div>
      <label>Template</label>
      <textarea id="tpl" placeholder="Hi {{name}},\n\nWelcome to {{company}}."></textarea>
    </div>
  </div>

  <label>Filename pattern (optional, placeholders supported)</label>
  <input id="namePattern" placeholder="{{name}}.txt" value="{{name}}.txt" />

  <button id="run">Generate</button>
  <button id="downloadAll" disabled>Download All (.txt bundle)</button>

  <h3>Preview</h3>
  <pre id="out">No output yet.</pre>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return { headers: [], rows: [] };
      const split = (line) => {
        const out = []; let cur = ''; let q = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (q && line[i+1] === '"') { cur += '"'; i++; }
            else q = !q;
          } else if (ch === ',' && !q) {
            out.push(cur); cur = '';
          } else cur += ch;
        }
        out.push(cur);
        return out.map(s => s.trim());
      };
      const headers = split(lines[0]);
      const rows = lines.slice(1).map(line => {
        const vals = split(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i] ?? '');
        return obj;
      });
      return { headers, rows };
    }

    function fillTemplate(tpl, data) {
      return tpl.replace(/\{\{\s*([\w-]+)\s*\}\}/g, (_, key) => data[key] ?? '');
    }

    let bundle = '';
    document.getElementById('run').onclick = () => {
      const csv = document.getElementById('csv').value;
      const tpl = document.getElementById('tpl').value;
      const pat = document.getElementById('namePattern').value || 'item.txt';
      const { rows } = parseCSV(csv);
      if (!rows.length || !tpl.trim()) {
        document.getElementById('out').textContent = 'Please provide valid CSV with at least one data row and a template.';
        return;
      }
      const parts = rows.map((row, idx) => {
        const fn = fillTemplate(pat, row) || `item-${idx+1}.txt`;
        const body = fillTemplate(tpl, row);
        return `### FILE: ${fn}\n${body}`;
      });
      bundle = parts.join('\n\n---\n\n');
      document.getElementById('out').textContent = bundle.slice(0, 5000);
      document.getElementById('downloadAll').disabled = false;
    };

    document.getElementById('downloadAll').onclick = () => {
      const blob = new Blob([bundle], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'generated-bundle.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    };
  </script>
</body>
</html>
